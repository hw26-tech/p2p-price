<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <title>Iniciar sesión • Finanzas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #020617; color: #f8fafc; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .container { max-width: 380px; width: 100%; }
    .app-cover { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 0; text-align: center; }
    .app-icon {
      width: 85px; height: 85px; background: #000; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; color: #fff; box-shadow: 0 0 20px rgba(59,130,246,0.3);
      margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.2rem; color: #fff; }
    .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 0.5rem; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.25rem; padding: 1.5rem; }
    .section-title { font-size: 0.75rem; font-weight: 700; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.7rem; color: #64748b; font-weight: 600; margin-bottom: 0.4rem; }
    .field input {
      width: 100%; padding: 0.75rem 0.85rem; background: #020617;
      border: 1px solid #334155; border-radius: 0.75rem;
      color: #fff; font-size: 0.95rem; outline: none;
    }
    .field input:focus { border-color: #3b82f6; }
    .btn-primary {
      width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: none;
      background: #3b82f6; color: #fff; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; margin-top: 0.3rem; transition: 0.2s;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #ef4444; font-size: 0.78rem; margin-top: 0.8rem; text-align: center; min-height: 1rem; }
    .back-link { display: block; text-align: center; margin-top: 1.2rem; color: #64748b; font-size: 0.78rem; text-decoration: none; }
    .back-link:hover { color: #94a3b8; }
  </style>
</head>
<body>
<div class="container">
  <div class="app-cover">
    <div class="app-icon">🔒</div>
    <h1>Acceso Privado</h1>
    <p class="subtitle">Gestión financiera personal</p>
  </div>

  <div class="card">
    <div class="section-title">Iniciar sesión</div>
    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="Usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <a class="back-link" href="/index.html">← Volver a las tasas</a>
  </div>
</div>

<script>
  const TOKEN_KEY = 'finanzas_token';

  // SIEMPRE pedir credenciales: limpiar cualquier token existente al cargar login
  sessionStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(TOKEN_KEY);

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const r = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();

      if (r.ok && data.success && data.token) {
        // Guardar en sessionStorage: se borra al cerrar pestaña
        sessionStorage.setItem(TOKEN_KEY, data.token);
        window.location.href = '/finanzas.html';
      } else {
        errorMsg.textContent = data.error || 'Credenciales incorrectas';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    } catch (err) {
      errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
