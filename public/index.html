<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <title>P2P Price Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #f8fafc;
      min-height: 100vh;
      padding: 1rem;
    }
    .container { max-width: 600px; margin: 0 auto; }

    /* PORTADA TIPO APP */
    .app-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 0;
      text-align: center;
    }
    .app-icon {
      width: 85px;
      height: 85px;
      background: #000;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: #fff;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.2rem; color: #fff; }
    .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 0.8rem; }

    /* BOTON ALERTAS */
    .notif-btn {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .notif-btn.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

    /* CALCULADORA */
    .card-calc {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1.25rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .section-title { font-size: 0.75rem; font-weight: 700; color: #3b82f6; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .calc-field label { display: block; font-size: 0.7rem; color: #64748b; margin-bottom: 0.4rem; font-weight: 600; }
    .calc-field input, .calc-field select {
      width: 100%;
      padding: 0.75rem;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    .calc-res { background: rgba(59, 130, 246, 0.1); border-radius: 0.75rem; padding: 0.8rem; text-align: center; border: 1px dashed rgba(59, 130, 246, 0.3); }
    .calc-res-val { font-size: 1.6rem; font-weight: 800; color: #3b82f6; }

    /* CARDS DE TASAS */
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1.25rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .price-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #1e293b; }
    .price-row:last-child { border-bottom: none; }
    .p-label { font-size: 0.85rem; color: #94a3b8; }
    .p-val { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .p-val.main { font-size: 1.5rem; color: #3b82f6; }

    /* BRECHA */
    .brecha-box { margin-top: 0.5rem; }
    .brecha-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .brecha-pct { font-size: 1.2rem; font-weight: 800; color: #10b981; }
    .bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: #3b82f6; transition: 0.5s; }

    /* BOTONES ACCION */
    .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn { flex: 1; padding: 0.7rem; border-radius: 0.75rem; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
    .btn:active { transform: scale(0.98); }

    /* REFRESH */
    .refresh-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem; width: 55px; height: 55px; border-radius: 50%;
      background: #3b82f6; color: #fff; border: none; font-size: 1.5rem; cursor: pointer;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); z-index: 100;
    }

    footer { text-align: center; padding: 2rem 0; color: #334155; font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-cover">
      <div class="app-icon">₿</div>
      <h1>P2P Price Tracker</h1>
      <p class="subtitle">Tasas en tiempo real • @hwisintainer</p>
      <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 Alertas L/M/V</button>
    </div>

    <!-- CALCULADORA -->
    <div class="card-calc">
      <div class="section-title">Calculadora</div>
      <div class="calc-grid">
        <div class="calc-field">
          <label>Tasa</label>
          <select id="calcRate" onchange="updateCalc()">
            <option value="binance">Binance Promedio</option>
            <option value="bcv">BCV Dólar</option>
            <option value="euro">BCV Euro</option>
          </select>
        </div>
        <div class="calc-field">
          <label>Monto</label>
          <input type="number" id="calcUSD" placeholder="0" oninput="updateCalc()">
        </div>
      </div>
      <div class="calc-res">
        <div class="calc-res-val" id="calcResult">Bs 0,00</div>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="copyCalc()">Copiar</button>
        <button class="btn" onclick="generateCapture()">Captura</button>
      </div>
    </div>

    <!-- BINANCE -->
    <div class="card">
      <div class="section-title">Binance P2P</div>
      <div class="price-row"><span class="p-label">Compra</span><span class="p-val" id="binBuy">—</span></div>
      <div class="price-row"><span class="p-label">Venta</span><span class="p-val" id="binSell">—</span></div>
      <div class="price-row"><span class="p-label">Promedio</span><span class="p-val" id="binAvg" style="color:#3b82f6;">—</span></div>
    </div>

    <!-- OFICIALES -->
    <div class="card">
      <div class="section-title">Tasas BCV</div>
      <div class="price-row"><span class="p-label">Dólar (USD)</span><span class="p-val main" id="bcvUSD">—</span></div>
      <div class="price-row"><span class="p-label">Euro (EUR)</span><span class="p-val main" id="bcvEUR">—</span></div>
    </div>

    <!-- BRECHA -->
    <div class="card">
      <div class="section-title">Brecha Cambiaria</div>
      <div class="brecha-box">
        <div class="brecha-info">
          <span class="p-val" id="brechaVal">—</span>
          <span class="brecha-pct" id="brechaPct">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="barFill" style="width: 0%;"></div></div>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="copyAll()">Copiar Todo</button>
        <button class="btn" onclick="shareWA()">WhatsApp</button>
      </div>
    </div>

    <div style="text-align:center; font-size:0.7rem; color:#475569;">
      Actualizado: <span id="lastUpd">—</span> • Próximo en <span id="nextUpd">30</span>s
    </div>
    <footer>P2P Price Tracker v2.0</footer>
  </div>

  <button class="refresh-btn" id="refBtn" onclick="manualRefresh()">⚡</button>

  <script>
    let current = { binBuy:0, binSell:0, bcv:0, euro:0 };
    let notifOn = localStorage.getItem('notifOn') === 'true';
    let timer = null;

    function fmt(v) { return v ? 'Bs ' + Number(v).toLocaleString('es-VE',{minFD:2, maxFD:2}) : '—'; }

    async function load() {
      try {
        const t = Date.now();
        const [r1, r2] = await Promise.all([
          fetch('/api/binance_ves?t='+t, {cache:'no-store'}),
          fetch('/api/bcv_ves?t='+t, {cache:'no-store'})
        ]);
        const d1 = await r1.json();
        const d2 = await r2.json();

        const prev = { avg: (current.binBuy+current.binSell)/2, bcv: current.bcv };

        if(d1.success) {
          current.binBuy = d1.buy; current.binSell = d1.sell;
          document.getElementById('binBuy').textContent = fmt(d1.buy);
          document.getElementById('binSell').textContent = fmt(d1.sell);
          document.getElementById('binAvg').textContent = fmt((d1.buy+d1.sell)/2);
        }
        if(d2.success) {
          current.bcv = d2.rate; current.euro = d2.euro;
          document.getElementById('bcvUSD').textContent = fmt(d2.rate);
          document.getElementById('bcvEUR').textContent = fmt(d2.euro);
        }

        const avg = (current.binBuy+current.binSell)/2;
        const diff = avg - current.bcv;
        const pct = current.bcv ? (diff/current.bcv)*100 : 0;
        document.getElementById('brechaVal').textContent = fmt(diff);
        document.getElementById('brechaPct').textContent = pct.toFixed(2)+'%';
        document.getElementById('barFill').style.width = Math.min(pct*5, 100)+'%';

        updateCalc();
        document.getElementById('lastUpd').textContent = new Date().toLocaleTimeString();
        startTimer();
        checkNotif(prev);
      } catch(e) { console.error(e); }
    }

    function manualRefresh() {
      const b = document.getElementById('refBtn');
      b.style.transform = 'rotate(360deg)';
      b.style.transition = '0.4s';
      setTimeout(()=>{ b.style.transform=''; b.style.transition=''; }, 400);
      load();
    }

    function startTimer() {
      if(timer) clearInterval(timer);
      let c = 30;
      document.getElementById('nextUpd').textContent = c;
      timer = setInterval(()=>{
        c--; document.getElementById('nextUpd').textContent = c;
        if(c<=0) { clearInterval(timer); load(); }
      }, 1000);
    }

    function updateCalc() {
      const v = Number(document.getElementById('calcUSD').value) || 0;
      const t = document.getElementById('calcRate').value;
      let r = current.bcv;
      if(t==='binance') r = (current.binBuy+current.binSell)/2;
      if(t==='euro') r = current.euro;
      document.getElementById('calcResult').textContent = fmt(v * r);
    }

    function copyCalc() {
      const txt = `🧮 Calculadora HW:\n${document.getElementById('calcUSD').value} = ${document.getElementById('calcResult').textContent}`;
      navigator.clipboard.writeText(txt); alert('Copiado');
    }

    function copyAll() {
      const avg = (current.binBuy+current.binSell)/2;
      const txt = `📊 Tasas HW:\n🔸 Binance: ${fmt(avg)}\n🏦 BCV USD: ${fmt(current.bcv)}\n🇪🇺 BCV EUR: ${fmt(current.euro)}`;
      navigator.clipboard.writeText(txt); alert('Tasas copiadas');
    }

    function shareWA() {
      const avg = (current.binBuy+current.binSell)/2;
      const txt = `📊 Tasas HW:\n🔸 Binance: ${fmt(avg)}\n🏦 BCV USD: ${fmt(current.bcv)}\n🇪🇺 BCV EUR: ${fmt(current.euro)}`;
      window.open('https://wa.me/?text='+encodeURIComponent(txt));
    }

    function toggleNotifications() {
      if(notifOn) {
        notifOn = false; localStorage.setItem('notifOn','false');
        document.getElementById('notifBtn').classList.remove('active');
      } else {
        Notification.requestPermission().then(p => {
          if(p==='granted') {
            notifOn = true; localStorage.setItem('notifOn','true');
            document.getElementById('notifBtn').classList.add('active');
          }
        });
      }
    }

    function checkNotif(prev) {
      if(!notifOn || Notification.permission!=='granted') return;
      const day = new Date().getDay();
      if(![1,3,5].includes(day)) return;
      const avg = (current.binBuy+current.binSell)/2;
      if(avg > prev.avg && prev.avg > 0) new Notification('📈 Binance subió', {body: fmt(avg)});
    }

    async function generateCapture() {
      const avg = (current.binBuy+current.binSell)/2;
      const area = document.createElement('div');
      area.style = "padding:30px; background:#020617; color:#fff; width:400px; text-align:center; font-family:sans-serif; position:fixed; left:-9999px;";
      area.innerHTML = `<div style="border:1px solid #1e293b; padding:25px; border-radius:20px; background:#0f172a;">
        <div style="font-size:50px; margin-bottom:10px;">₿</div>
        <h2 style="margin-bottom:20px; color:#3b82f6;">TASAS HW</h2>
        <div style="font-size:20px; margin:10px 0;">Binance: ${fmt(avg)}</div>
        <div style="font-size:20px; margin:10px 0;">BCV USD: ${fmt(current.bcv)}</div>
        <div style="font-size:20px; margin:10px 0;">BCV EUR: ${fmt(current.euro)}</div>
        <div style="font-size:10px; color:#475569; margin-top:20px;">${new Date().toLocaleString()}</div>
      </div>`;
      document.body.appendChild(area);
      const canvas = await html2canvas(area);
      const link = document.createElement('a');
      link.download = 'Tasas_HW.png'; link.href = canvas.toDataURL(); link.click();
      document.body.removeChild(area);
    }

    window.onload = () => {
      if(notifOn) document.getElementById('notifBtn').classList.add('active');
      load();
    };
  </script>
</body>
</html>
