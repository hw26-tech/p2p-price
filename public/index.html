<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <title>P2P Price Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #f8fafc;
      min-height: 100vh;
      padding: 1rem;
    }
    .container { max-width: 600px; margin: 0 auto; }

    .app-cover {
      display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 0; text-align: center;
    }
    .app-icon {
      width: 85px; height: 85px; background: #000; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 50px; color: #fff;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
      margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.2rem; color: #fff; }
    .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 0.8rem; }
    .notif-btn {
      background: rgba(30,41,59,0.5); border: 1px solid #334155;
      color: #94a3b8; padding: 0.5rem 1rem; border-radius: 10px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .notif-btn.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.1); }

    .card {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 1rem;
    }

    /* HEADER DE CARD CON STATUS */
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 0.75rem; font-weight: 700; color: #3b82f6;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-dot {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.68rem; font-weight: 600; color: #64748b;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #334155; transition: background 0.3s;
    }
    .dot.ok { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .dot.error { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* CALCULADORA */
    .calc-layout {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; align-items: center;
    }
    .calc-left { display: flex; flex-direction: column; gap: 0.6rem; }
    .calc-left label { font-size: 0.7rem; color: #64748b; font-weight: 600; }
    .calc-left select {
      width: 100%; padding: 0.65rem 0.75rem;
      background: #020617; border: 1px solid #334155;
      border-radius: 0.75rem; color: #fff; font-size: 0.9rem; outline: none;
    }
    .calc-result-box {
      background: rgba(59,130,246,0.1);
      border: 1px dashed rgba(59,130,246,0.35);
      border-radius: 0.75rem; padding: 0.65rem 0.75rem; text-align: center;
    }
    .calc-result-box .res-label { font-size: 0.65rem; color: #64748b; margin-bottom: 0.2rem; }
    .calc-result-box .res-val { font-size: 1.3rem; font-weight: 800; color: #3b82f6; }
    .calc-right { display: flex; flex-direction: column; gap: 0.6rem; }
    .calc-field label { display: block; font-size: 0.7rem; color: #64748b; font-weight: 600; margin-bottom: 0.3rem; }
    .calc-field input {
      width: 100%; padding: 0.65rem 0.75rem;
      background: #020617; border: 1px solid #334155;
      border-radius: 0.75rem; color: #fff; font-size: 1rem; outline: none;
    }
    .calc-field input:focus { border-color: #3b82f6; }

    /* PRECIOS */
    .price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.55rem 0; border-bottom: 1px solid #1e293b;
    }
    .price-row:last-child { border-bottom: none; }
    .p-label { font-size: 0.85rem; color: #94a3b8; }
    .p-val {
      font-size: 1.15rem; font-weight: 800; color: #fff;
      font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
    }
    .p-val.accent { color: #3b82f6; font-size: 1.3rem; }
    .p-val.bcv-main { color: #3b82f6; font-size: 1.45rem; }

    /* BRECHA */
    .brecha-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .brecha-pct { font-size: 1.2rem; font-weight: 800; color: #10b981; }
    .bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: #3b82f6; transition: 0.5s; }

    .btn-group { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .btn {
      flex: 1; padding: 0.65rem; border-radius: 0.75rem;
      border: 1px solid #334155; background: #1e293b;
      color: #fff; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }
    .btn:active { transform: scale(0.97); }

    .refresh-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 55px; height: 55px; border-radius: 50%;
      background: #3b82f6; color: #fff; border: none;
      font-size: 1.5rem; cursor: pointer;
      box-shadow: 0 4px 15px rgba(59,130,246,0.4); z-index: 100;
    }
    .ts { text-align: center; font-size: 0.7rem; color: #475569; margin-bottom: 1rem; }
    footer { text-align: center; padding: 2rem 0; color: #334155; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="container">

  <div class="app-cover">
    <div class="app-icon">₿</div>
    <h1>P2P Price Tracker</h1>
    <p class="subtitle">Tasas en tiempo real • @hwisintainer</p>
    <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 Alertas L/M/V</button>
  </div>

  <!-- CALCULADORA -->
  <div class="card">
    <div class="card-header">
      <div class="section-title">Calculadora</div>
    </div>
    <div class="calc-layout">
      <div class="calc-left">
        <div>
          <label>Tasa</label>
          <select id="calcRate" onchange="calcFromUSD()">
            <option value="binance">Binance Promedio</option>
            <option value="bcv">BCV Dólar</option>
            <option value="euro">BCV Euro</option>
          </select>
        </div>
        <div class="calc-result-box">
          <div class="res-label" id="calcResLabel">Resultado</div>
          <div class="res-val" id="calcResult">—</div>
        </div>
      </div>
      <div class="calc-right">
        <div class="calc-field">
          <label>USD / EUR</label>
          <input type="number" id="inputUSD" placeholder="0.00" oninput="calcFromUSD()">
        </div>
        <div class="calc-field">
          <label>Bolívares (Bs)</label>
          <input type="number" id="inputBS" placeholder="0.00" oninput="calcFromBS()">
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="copyCalc()">📋 Copiar</button>
      <button class="btn" onclick="generateCapture()">📸 Captura</button>
    </div>
  </div>

  <!-- BINANCE -->
  <div class="card">
    <div class="card-header">
      <div class="section-title">Binance P2P</div>
      <div class="status-dot">
        <div class="dot loading" id="dotBinance"></div>
        <span id="lblBinance">Cargando...</span>
      </div>
    </div>
    <div class="price-row"><span class="p-label">Compra</span><span class="p-val" id="binBuy">—</span></div>
    <div class="price-row"><span class="p-label">Venta</span><span class="p-val" id="binSell">—</span></div>
    <div class="price-row"><span class="p-label">Promedio</span><span class="p-val accent" id="binAvg">—</span></div>
  </div>

  <!-- BCV -->
  <div class="card">
    <div class="card-header">
      <div class="section-title">Tasas BCV</div>
      <div class="status-dot">
        <div class="dot loading" id="dotBCV"></div>
        <span id="lblBCV">Cargando...</span>
      </div>
    </div>
    <div class="price-row"><span class="p-label">Dólar (USD)</span><span class="p-val bcv-main" id="bcvUSD">—</span></div>
    <div class="price-row"><span class="p-label">Euro (EUR)</span><span class="p-val bcv-main" id="bcvEUR">—</span></div>
  </div>

  <!-- BRECHA -->
  <div class="card">
    <div class="card-header">
      <div class="section-title">Brecha Cambiaria</div>
    </div>
    <div class="brecha-info">
      <span class="p-val" id="brechaVal">—</span>
      <span class="brecha-pct" id="brechaPct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%;"></div></div>
    <div class="btn-group">
      <button class="btn" onclick="copyAll()">📋 Copiar Todo</button>
      <button class="btn" onclick="shareWA()">💬 WhatsApp</button>
    </div>
  </div>

  <div class="ts">Actualizado: <span id="lastUpd">—</span> • Próximo en <span id="nextUpd">30</span>s</div>
  <footer>P2P Price Tracker v2.0</footer>
</div>

<button class="refresh-btn" id="refBtn" onclick="manualRefresh()">⚡</button>

<script>
  let cur = { binBuy:0, binSell:0, bcv:0, euro:0 };
  let notifOn = localStorage.getItem('notifOn') === 'true';
  let timer = null;

  // Formato con puntos de miles y coma decimal (estilo venezolano)
  function fmt(v) {
    if (!v || isNaN(v)) return '—';
    return 'Bs\u00A0' + Number(v).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function fmtUSD(v) {
    if (!v || isNaN(v)) return '—';
    return '$\u00A0' + Number(v).toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function setStatus(id, lblId, ok) {
    const dot = document.getElementById(id);
    const lbl = document.getElementById(lblId);
    dot.className = 'dot ' + (ok ? 'ok' : 'error');
    lbl.textContent = ok ? 'En línea' : 'Sin datos';
  }

  function getRate() {
    const t = document.getElementById('calcRate').value;
    if (t==='binance') return (cur.binBuy+cur.binSell)/2;
    if (t==='euro') return cur.euro;
    return cur.bcv;
  }

  function calcFromUSD() {
    const v = parseFloat(document.getElementById('inputUSD').value);
    const r = getRate();
    document.getElementById('inputBS').value = '';
    if (!isNaN(v) && r) {
      document.getElementById('calcResult').textContent = fmt(v * r);
      document.getElementById('calcResLabel').textContent = 'USD → Bs';
    } else {
      document.getElementById('calcResult').textContent = '—';
    }
  }

  function calcFromBS() {
    const v = parseFloat(document.getElementById('inputBS').value);
    const r = getRate();
    document.getElementById('inputUSD').value = '';
    if (!isNaN(v) && r) {
      document.getElementById('calcResult').textContent = fmtUSD(v / r);
      document.getElementById('calcResLabel').textContent = 'Bs → USD';
    } else {
      document.getElementById('calcResult').textContent = '—';
    }
  }

  function copyCalc() {
    const txt = document.getElementById('calcResLabel').textContent + ': ' + document.getElementById('calcResult').textContent;
    navigator.clipboard.writeText(txt); alert('Copiado ✅');
  }

  async function load() {
    try {
      const t = Date.now();
      const [r1, r2] = await Promise.all([
        fetch('/api/binance_ves?t='+t, {cache:'no-store'}),
        fetch('/api/bcv_ves?t='+t, {cache:'no-store'})
      ]);
      const d1 = await r1.json();
      const d2 = await r2.json();
      const prev = { avg:(cur.binBuy+cur.binSell)/2, bcv:cur.bcv };

      if (d1.success) {
        cur.binBuy=d1.buy; cur.binSell=d1.sell;
        document.getElementById('binBuy').textContent  = fmt(d1.buy);
        document.getElementById('binSell').textContent = fmt(d1.sell);
        document.getElementById('binAvg').textContent  = fmt((d1.buy+d1.sell)/2);
        setStatus('dotBinance','lblBinance', true);
      } else { setStatus('dotBinance','lblBinance', false); }

      if (d2.success) {
        cur.bcv=d2.rate; cur.euro=d2.euro;
        document.getElementById('bcvUSD').textContent = fmt(d2.rate);
        document.getElementById('bcvEUR').textContent = fmt(d2.euro);
        setStatus('dotBCV','lblBCV', true);
      } else { setStatus('dotBCV','lblBCV', false); }

      const avg = (cur.binBuy+cur.binSell)/2;
      const diff = avg - cur.bcv;
      const pct = cur.bcv ? (diff/cur.bcv)*100 : 0;
      document.getElementById('brechaVal').textContent = fmt(diff);
      document.getElementById('brechaPct').textContent = pct.toFixed(2)+'%';
      document.getElementById('barFill').style.width = Math.min(pct*5,100)+'%';

      document.getElementById('lastUpd').textContent = new Date().toLocaleTimeString();
      startTimer();
      checkNotif(prev);
    } catch(e) {
      console.error(e);
      setStatus('dotBinance','lblBinance', false);
      setStatus('dotBCV','lblBCV', false);
    }
  }

  function manualRefresh() {
    const b = document.getElementById('refBtn');
    b.style.transform='rotate(360deg)'; b.style.transition='0.4s';
    setTimeout(()=>{ b.style.transform=''; b.style.transition=''; }, 400);
    load();
  }

  function startTimer() {
    if (timer) clearInterval(timer);
    let c=30; document.getElementById('nextUpd').textContent=c;
    timer = setInterval(()=>{ c--; document.getElementById('nextUpd').textContent=c; if(c<=0){clearInterval(timer);load();} }, 1000);
  }

  function copyAll() {
    const avg=(cur.binBuy+cur.binSell)/2;
    const txt=`📊 Tasas HW:\n🔸 Binance: ${fmt(avg)}\n🏦 BCV USD: ${fmt(cur.bcv)}\n🇪🇺 BCV EUR: ${fmt(cur.euro)}`;
    navigator.clipboard.writeText(txt); alert('Tasas copiadas ✅');
  }

  function shareWA() {
    const avg=(cur.binBuy+cur.binSell)/2;
    const txt=`📊 Tasas HW:\n🔸 Binance: ${fmt(avg)}\n🏦 BCV USD: ${fmt(cur.bcv)}\n🇪🇺 BCV EUR: ${fmt(cur.euro)}`;
    window.open('https://wa.me/?text='+encodeURIComponent(txt));
  }

  function toggleNotifications() {
    if (notifOn) {
      notifOn=false; localStorage.setItem('notifOn','false');
      document.getElementById('notifBtn').classList.remove('active');
      document.getElementById('notifBtn').textContent='🔔 Alertas L/M/V';
    } else {
      Notification.requestPermission().then(p=>{
        if(p==='granted'){
          notifOn=true; localStorage.setItem('notifOn','true');
          document.getElementById('notifBtn').classList.add('active');
          document.getElementById('notifBtn').textContent='🔕 Alertas ON';
        }
      });
    }
  }

  function checkNotif(prev) {
    if (!notifOn||Notification.permission!=='granted') return;
    const day=new Date().getDay();
    if (![1,3,5].includes(day)) return;
    const avg=(cur.binBuy+cur.binSell)/2;
    if (avg>prev.avg&&prev.avg>0) new Notification('📈 Binance subió',{body:fmt(avg)});
    if (cur.bcv>prev.bcv&&prev.bcv>0) new Notification('📈 BCV USD subió',{body:fmt(cur.bcv)});
  }

  async function generateCapture() {
    const avg=(cur.binBuy+cur.binSell)/2;
    const area=document.createElement('div');
    area.style='padding:30px;background:#020617;color:#fff;width:400px;text-align:center;font-family:sans-serif;position:fixed;left:-9999px;';
    area.innerHTML=`<div style="border:1px solid #1e293b;padding:25px;border-radius:20px;background:#0f172a;">
      <div style="font-size:50px;margin-bottom:10px;">₿</div>
      <h2 style="margin-bottom:20px;color:#3b82f6;">TASAS HW</h2>
      <div style="font-size:20px;margin:10px 0;">Binance: ${fmt(avg)}</div>
      <div style="font-size:20px;margin:10px 0;">BCV USD: ${fmt(cur.bcv)}</div>
      <div style="font-size:20px;margin:10px 0;">BCV EUR: ${fmt(cur.euro)}</div>
      <div style="font-size:10px;color:#475569;margin-top:20px;">${new Date().toLocaleString()}</div>
    </div>`;
    document.body.appendChild(area);
    const canvas=await html2canvas(area);
    const link=document.createElement('a');
    link.download='Tasas_HW.png'; link.href=canvas.toDataURL(); link.click();
    document.body.removeChild(area);
  }

  window.onload=()=>{
    if (notifOn) { document.getElementById('notifBtn').classList.add('active'); document.getElementById('notifBtn').textContent='🔕 Alertas ON'; }
    load();
  };
</script>
</body>
</html>
